<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja do Flitz- Login</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#0f172a,#1d4ed8,#2563eb);
}
.container{
    width:380px;
    background:rgba(255,255,255,.1);
    backdrop-filter:blur(15px);
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.4);
    color:white;
}
h1{text-align:center;margin-bottom:10px;}
p{text-align:center;margin-bottom:20px;color:#ddd;}
.menu{display:flex;gap:10px;margin-bottom:20px;}
.menu button{flex:1;}
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    font-size:16px;
}
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#00a8ff;
    color:white;
    font-size:16px;
    cursor:pointer;
}
button:hover{background:#0090dd;}
#cadastro{display:none;}
#msg{margin-top:15px;text-align:center;color:#ffb3b3;}
</style>
</head>
<body>

<div class="container">
    <h1>🖥️ LOJA DO FLITZ</h1>
    <p>Login do Sistema</p>

    <div class="menu">
        <button onclick="mostrarLogin()">Login</button>
        <button onclick="mostrarCadastro()">Cadastro</button>
    </div>

    <div id="login">
        <input type="text" id="usuario" placeholder="Usuário">
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="login()">Entrar</button>
    </div>

    <div id="cadastro">
        <input type="text" id="novoUsuario" placeholder="Novo usuário">
        <input type="password" id="novaSenha" placeholder="Nova senha">
        <button onclick="cadastrar()">Cadastrar</button>
    </div>

    <p id="msg"></p>
</div>

<script>
function mostrarLogin(){
    document.getElementById("login").style.display="block";
    document.getElementById("cadastro").style.display="none";
    document.getElementById("msg").innerHTML="";
}

function mostrarCadastro(){
    document.getElementById("login").style.display="none";
    document.getElementById("cadastro").style.display="block";
    document.getElementById("msg").innerHTML="";
}

function cadastrar(){
    let usuario=document.getElementById("novoUsuario").value;
    let senha=document.getElementById("novaSenha").value;

    if(usuario=="" || senha==""){
        alert("Preencha todos os campos.");
        return;
    }

    localStorage.setItem(usuario,senha);
    alert("Cadastro realizado com sucesso!");
    mostrarLogin();
}

function login(){
    let usuario=document.getElementById("usuario").value;
    let senha=document.getElementById("senha").value;

    // Login do administrador
    if(usuario==="Cr7" && senha==="siu"){
        alert("Login realizado com sucesso!");
        window.location.href="loja.html";
        return;
    }

    // Login de usuários cadastrados
    let senhaSalva=localStorage.getItem(usuario);

    if(senhaSalva===null){
        document.getElementById("msg").innerHTML="Usuário não encontrado.";
        return;
    }

    if(senha!==senhaSalva){
        document.getElementById("msg").innerHTML="Senha incorreta.";
        return;
    }

    alert("Login realizado com sucesso!");
    window.location.href="loja.html";
}
</script>

</body>
</html>
